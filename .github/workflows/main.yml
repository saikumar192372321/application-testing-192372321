name: Automated Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  test:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./VSN-Web-App
        run: npm install

      - name: Install Testing Dependencies (Selenium & ExcelJS)
        working-directory: ./VSN-Web-App
        run: npm install --save-dev selenium-webdriver exceljs

      - name: Start Vite Development Server
        working-directory: ./VSN-Web-App
        run: npm run dev &
        env:
          CI: true

      - name: Wait for Vite Server to be Ready
        run: sleep 10 # Gives Vite a few seconds to start up

      - name: Run Selenium Test Suite
        working-directory: ./VSN-Web-App
        run: node selenium-tests/tests/login.test.js
        env:
          CI: true # This tells our script to run Chrome in headless mode

      - name: Upload Excel Test Report to GitHub
        if: always() # Uploads the report even if the test fails
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Report
          path: ./VSN-Web-App/selenium-tests/login_test_report.xlsx
          retention-days: 14
